name: Tests

on: [pull_request, push]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18.x'

      - name: Install dependencies (root)
        run: npm install

      - name: Build web app
        run: npm run build --workspace=web

      - name: Lint web app
        run: npm run lint --workspace=web
