<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoftBoard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    // Language detection
    (function () {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('lang') === 'pt') return;

      const userLang = navigator.language || navigator.userLanguage;
      if (!userLang.startsWith('pt')) {
        window.location.href = '/en.html';
      }
    })();
  </script>
</head>

<body>
  <!-- Navbar -->
  <header class="header">
    <div class="container header-content">
      <div class="logo-container">
        <span class="logo-text">SoftBoard</span>
      </div>
      <nav class="flex items-center gap-4">
        <a href="/en.html" class="btn btn-ghost" style="font-size: 0.75rem;">EN</a>
        <a href="https://app.softboard.com.br" class="btn btn-primary">
          Entrar
        </a>
      </nav>
    </div>
  </header>

  <!-- Hero Section -->
  <main>
    <section class="container hero-section">
      <div class="badge">
        <span>Crie, valide e compartilhe</span>
      </div>

      <h1 class="hero-title">
        MVPs rápidos e inteligentes.
      </h1>

      <p class="hero-description">
        Transforme sua ideia em um protótipo funcional em apenas 3 passos. Valide o seu MVP em minutos com o apoio do
        nosso assistente de IA.
      </p>

      <div class="flex items-center justify-center gap-4">
        <a href="https://app.softboard.com.br" class="btn btn-primary btn-lg">
          Começar a criar
        </a>
      </div>

      <!-- App Preview Mockup / GIF Placeholder -->
      <div class="mockup-container flex items-center justify-center bg-slate-100">
        <img src="/softboard.gif" alt="SoftBoard MVP Preview"
          style="display: block; width: 100%; height: auto; border-radius: var(--radius);">
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container flex items-center justify-center">
      <p>
        © 2026 SoftBoard
      </p>
    </div>
  </footer>

</body>

</html>
